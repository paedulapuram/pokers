services:
  - type: web
    name: pokers
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: POKER_ROLE_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
